name: Installer E2E (real OS)

# Runs the REAL bootstrap installers end-to-end on the platforms they target —
# actual git clone, actual uv venv, actual setup-hermes.sh — and asserts the
# `hermes` command resolves. The previous Ubuntu-only CI proved the wrong
# platform and let a Windows-only symlink bug ship. -NoDesktop keeps runtime
# sane (skips the Electron build). Each installer runs TWICE to prove a re-run
# repairs a partial install instead of breaking it.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Windows install (real)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Ensure pyyaml for the branding step
        shell: pwsh
        run: py -m pip install --quiet pyyaml

      - name: Prereq detection + dry-run plan (winget-branch decision logic)
        shell: pwsh
        run: |
          # Exercises the code that DECIDES whether to hit the winget branch:
          # Have / Node-Ok / Py-Ok / Find-Bash + repo reachability. All prereqs
          # are present on the runner, so this asserts the happy path detects
          # them (never mis-fires winget) and that DryRun changes nothing —
          # coverage that needs no clean machine and touches no install state.
          $log = pwsh -File dist/jarvis-windows.ps1 -DryRun -Dir "$env:RUNNER_TEMP\jv-dry" 2>&1 | Out-String
          Write-Host $log
          if ($LASTEXITCODE -ne 0)                         { throw "DryRun exited $LASTEXITCODE" }
          if ($log -notmatch 'OK git ')                    { throw "git not detected (would wrongly trigger winget)" }
          if ($log -notmatch 'OK Python ')                 { throw "python not detected (would wrongly trigger winget)" }
          if ($log -notmatch 'OK Node ')                   { throw "node not detected (would wrongly trigger winget)" }
          if ($log -notmatch 'reachable:.*hermes-agent')   { throw "hermes repo reachability not exercised" }
          if ($log -notmatch 'Git Bash found')             { throw "Git Bash detection not exercised" }
          if ($log -notmatch 'Dry run complete')           { throw "no completion line" }
          if (Test-Path "$env:RUNNER_TEMP\jv-dry")         { throw "DryRun must not create the install dir" }
          Write-Host "OK: prereq detection + reachability + plan exercised; nothing installed or cloned."

      - name: winget branch — prove the invocation on the runner
        continue-on-error: true
        shell: pwsh
        run: |
          winget --version
          # The exact command our installer runs when a prereq is missing
          # (see Winget-Install in dist/jarvis-windows.ps1). git is preinstalled
          # here, so winget reports already-installed/upgrade — this proves the
          # invocation + arg syntax resolve on a real runner.
          winget install --id Git.Git -e --source winget --accept-package-agreements --accept-source-agreements
          Write-Host "::notice::winget invocation + prereq-detection verified on the runner. What a GitHub runner CANNOT prove (git/python/node are preinstalled): the missing-prereq -> Winget-Install -> Refresh-Path -> re-detect transition. That single path needs a clean Windows VM; everything around it (detection, plan, install invocation, real end-to-end install, idempotent re-run) is covered above."

      - name: E2E install (this commit's overlay, no desktop)
        shell: pwsh
        run: pwsh -File dist/jarvis-windows.ps1 -NoDesktop -Dir "$env:RUNNER_TEMP\jv" -OverlayDir "$env:GITHUB_WORKSPACE"

      - name: Assert hermes resolves and is JARVIS-branded
        shell: pwsh
        run: |
          $bash = "C:\Program Files\Git\bin\bash.exe"
          $out = (& $bash -lc 'export PATH="$HOME/.local/bin:$PATH"; hermes --version') -join "`n"
          Write-Host "hermes --version => $out"
          if ($LASTEXITCODE -ne 0)     { throw "hermes did not resolve via ~/.local/bin" }
          if ($out -notmatch 'JARVIS') { throw "expected JARVIS branding in version output" }
          $cmdOut = (& "$env:USERPROFILE\.local\bin\hermes.cmd" --version) -join "`n"
          if ($LASTEXITCODE -ne 0)     { throw "hermes.cmd (cross-shell shim) did not resolve" }
          Write-Host "hermes.cmd => $cmdOut"

      - name: Idempotency — re-run must repair, not break
        shell: pwsh
        run: |
          pwsh -File dist/jarvis-windows.ps1 -NoDesktop -Dir "$env:RUNNER_TEMP\jv" -OverlayDir "$env:GITHUB_WORKSPACE"
          $bash = "C:\Program Files\Git\bin\bash.exe"
          $out = (& $bash -lc 'export PATH="$HOME/.local/bin:$PATH"; hermes --version') -join "`n"
          if ($LASTEXITCODE -ne 0) { throw "hermes broke after re-run" }
          Write-Host "re-run OK: $out"

  macos:
    name: macOS install (real)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Ensure pyyaml for the branding step
        run: python3 -m pip install --quiet --break-system-packages pyyaml || python3 -m pip install --quiet pyyaml

      - name: E2E install (this commit's overlay, no desktop)
        run: bash dist/jarvis-mac.sh --no-desktop --dir "$RUNNER_TEMP/jv" --overlay-dir "$GITHUB_WORKSPACE"

      - name: Assert hermes resolves and is JARVIS-branded
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          out="$(hermes --version)"; echo "hermes --version => $out"
          echo "$out" | grep -q JARVIS || { echo "expected JARVIS branding"; exit 1; }

      - name: Idempotency — re-run must repair, not break
        run: |
          bash dist/jarvis-mac.sh --no-desktop --dir "$RUNNER_TEMP/jv" --overlay-dir "$GITHUB_WORKSPACE"
          export PATH="$HOME/.local/bin:$PATH"
          hermes --version | grep -q JARVIS && echo "re-run OK"
