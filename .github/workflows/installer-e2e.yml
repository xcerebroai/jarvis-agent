name: Installer E2E (real OS)

# Runs the REAL bootstrap installers end-to-end on the platforms they target —
# actual git clone, actual uv venv, actual setup-hermes.sh — and asserts the
# `hermes` command resolves. The previous Ubuntu-only CI proved the wrong
# platform and let a Windows-only symlink bug ship. -NoDesktop keeps runtime
# sane (skips the Electron build). Each installer runs TWICE to prove a re-run
# repairs a partial install instead of breaking it.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows:
    name: Windows install (real)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # NOTE (#10): deliberately NO pyyaml preinstall. apply.sh must find yaml
      # via the install's venv python (pyyaml is a core Hermes dep) — end-user
      # machines have no system pyyaml, and preinstalling one here masked that.

      - name: Prereq detection + dry-run plan (winget-branch decision logic)
        shell: pwsh
        run: |
          # Exercises the code that DECIDES whether to hit the winget branch:
          # Have / Node-Ok / Py-Ok / Find-Bash + repo reachability. All prereqs
          # are present on the runner, so this asserts the happy path detects
          # them (never mis-fires winget) and that DryRun changes nothing —
          # coverage that needs no clean machine and touches no install state.
          $log = pwsh -File dist/jarvis-windows.ps1 -DryRun -Dir "$env:RUNNER_TEMP\jv-dry" 2>&1 | Out-String
          Write-Host $log
          if ($LASTEXITCODE -ne 0)                         { throw "DryRun exited $LASTEXITCODE" }
          if ($log -notmatch 'OK git ')                    { throw "git not detected (would wrongly trigger winget)" }
          if ($log -notmatch 'OK Python ')                 { throw "python not detected (would wrongly trigger winget)" }
          if ($log -notmatch 'OK Node ')                   { throw "node not detected (would wrongly trigger winget)" }
          if ($log -notmatch 'reachable:.*hermes-agent')   { throw "hermes repo reachability not exercised" }
          if ($log -notmatch 'Git Bash found')             { throw "Git Bash detection not exercised" }
          if ($log -notmatch 'Dry run complete')           { throw "no completion line" }
          if (Test-Path "$env:RUNNER_TEMP\jv-dry")         { throw "DryRun must not create the install dir" }
          Write-Host "OK: prereq detection + reachability + plan exercised; nothing installed or cloned."

      - name: winget branch — prove the invocation on the runner
        continue-on-error: true
        shell: pwsh
        run: |
          winget --version
          # The exact command our installer runs when a prereq is missing
          # (see Winget-Install in dist/jarvis-windows.ps1). git is preinstalled
          # here, so winget reports already-installed/upgrade — this proves the
          # invocation + arg syntax resolve on a real runner.
          winget install --id Git.Git -e --source winget --accept-package-agreements --accept-source-agreements
          Write-Host "::notice::winget invocation + prereq-detection verified on the runner. What a GitHub runner CANNOT prove (git/python/node are preinstalled): the missing-prereq -> Winget-Install -> Refresh-Path -> re-detect transition. That single path needs a clean Windows VM; everything around it (detection, plan, install invocation, real end-to-end install, idempotent re-run) is covered above."

      - name: E2E install (this commit's overlay, no desktop)
        shell: pwsh
        run: pwsh -File dist/jarvis-windows.ps1 -NoDesktop -Dir "$env:RUNNER_TEMP\jv" -OverlayDir "$env:GITHUB_WORKSPACE"

      - name: Assert hermes resolves and is JARVIS-branded
        shell: pwsh
        run: |
          $bash = "C:\Program Files\Git\bin\bash.exe"
          $out = (& $bash -lc 'export PATH="$HOME/.local/bin:$PATH"; hermes --version') -join "`n"
          Write-Host "hermes --version => $out"
          if ($LASTEXITCODE -ne 0)     { throw "hermes did not resolve via ~/.local/bin" }
          if ($out -notmatch 'JARVIS') { throw "expected JARVIS branding in version output" }
          $cmdOut = (& "$env:USERPROFILE\.local\bin\hermes.cmd" --version) -join "`n"
          if ($LASTEXITCODE -ne 0)     { throw "hermes.cmd (cross-shell shim) did not resolve" }
          Write-Host "hermes.cmd => $cmdOut"

      - name: Assert skin activated + jarvis shims on the Setup-PATH dir
        shell: pwsh
        run: |
          # (#10) Skin activation needs a python with pyyaml — must come from
          # the venv (none is preinstalled on this runner anymore).
          $cfgPath = Join-Path $env:LOCALAPPDATA 'hermes\config.yaml'
          if (-not (Test-Path $cfgPath)) { throw "config.yaml not created at $cfgPath — skin activation did not run" }
          $cfg = Get-Content $cfgPath -Raw
          if ($cfg -notmatch 'skin:\s*jarvis') { throw "display.skin: jarvis not set in config.yaml (finding #10)" }
          Write-Host "skin activated: display.skin=jarvis in $cfgPath"
          # (#6) jarvis shims must sit next to hermes.exe (venv\Scripts is the
          # dir the Setup path persists onto PATH; ~/.local/bin is not).
          $jcmd = "$env:RUNNER_TEMP\jv\hermes-agent\venv\Scripts\jarvis.cmd"
          if (-not (Test-Path $jcmd)) { throw "jarvis.cmd missing from venv\Scripts (finding #6)" }
          $jout = (& $jcmd --version) -join "`n"
          if ($LASTEXITCODE -ne 0) { throw "venv\Scripts\jarvis.cmd did not run" }
          Write-Host "venv\Scripts\jarvis.cmd => $jout"

      - name: Idempotency — re-run must repair, not break (+ shortcut icon)
        shell: pwsh
        env:
          # (#23) Exercise create_launch_points without a desktop build: plant
          # a stub exe, force launch points, and assert the .lnk uses the
          # JARVIS icon from the stable $HERMES_HOME\.jarvis path.
          JARVIS_FORCE_LAUNCH_POINTS: "1"
          JARVIS_SHORTCUT_DIR: ${{ runner.temp }}\jv-start
          JARVIS_DESKTOP_DIR: ${{ runner.temp }}\jv-desk
        run: |
          New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\jv\hermes-agent\apps\desktop\release\win-unpacked" | Out-Null
          Set-Content -Path "$env:RUNNER_TEMP\jv\hermes-agent\apps\desktop\release\win-unpacked\Hermes.exe" -Value 'stub'
          pwsh -File dist/jarvis-windows.ps1 -NoDesktop -Dir "$env:RUNNER_TEMP\jv" -OverlayDir "$env:GITHUB_WORKSPACE"
          $bash = "C:\Program Files\Git\bin\bash.exe"
          $out = (& $bash -lc 'export PATH="$HOME/.local/bin:$PATH"; hermes --version') -join "`n"
          if ($LASTEXITCODE -ne 0) { throw "hermes broke after re-run" }
          Write-Host "re-run OK: $out"
          $lnk = Join-Path "$env:RUNNER_TEMP\jv-start" 'JARVIS.lnk'
          if (-not (Test-Path $lnk)) { throw "JARVIS.lnk was not created (finding #23)" }
          $sc = (New-Object -ComObject WScript.Shell).CreateShortcut($lnk)
          Write-Host "IconLocation => $($sc.IconLocation)"
          if ($sc.IconLocation -notmatch '\.jarvis\\jarvis\.ico') { throw "shortcut does not use the JARVIS icon (finding #23): $($sc.IconLocation)" }
          $ico = Join-Path $env:LOCALAPPDATA 'hermes\.jarvis\jarvis.ico'
          if (-not (Test-Path $ico)) { throw "staged JARVIS icon missing at $ico" }
          Write-Host "shortcut icon OK: $ico"

  macos:
    name: macOS install (real)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # NOTE (#10): no pyyaml preinstall — apply.sh must use the venv python.

      - name: E2E install (this commit's overlay, no desktop)
        run: bash dist/jarvis-mac.sh --no-desktop --dir "$RUNNER_TEMP/jv" --overlay-dir "$GITHUB_WORKSPACE"

      - name: Assert hermes resolves and is JARVIS-branded
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          out="$(hermes --version)"; echo "hermes --version => $out"
          echo "$out" | grep -q JARVIS || { echo "expected JARVIS branding"; exit 1; }
          # (#10) Skin activation must have worked via the venv python.
          grep -Eq 'skin:\s*jarvis' "$HOME/.hermes/config.yaml" \
            || { echo "display.skin: jarvis not set (finding #10)"; exit 1; }
          echo "skin activated: display.skin=jarvis"

      - name: Idempotency — re-run must repair, not break (+ app copy)
        env:
          # (#24d) Exercise the macOS launch point without a real desktop
          # build: plant a stub .app, force launch points, and assert the
          # /Applications entry is a REAL directory copy — never a symlink
          # (Launchpad won't index one and Electron helper resolution dies).
          JARVIS_FORCE_LAUNCH_POINTS: "1"
        run: |
          mkdir -p "$RUNNER_TEMP/jv/hermes-agent/apps/desktop/release/mac/Hermes.app/Contents/MacOS"
          printf '#!/bin/sh\n' > "$RUNNER_TEMP/jv/hermes-agent/apps/desktop/release/mac/Hermes.app/Contents/MacOS/Hermes"
          bash dist/jarvis-mac.sh --no-desktop --dir "$RUNNER_TEMP/jv" --overlay-dir "$GITHUB_WORKSPACE"
          export PATH="$HOME/.local/bin:$PATH"
          hermes --version | grep -q JARVIS && echo "re-run OK"
          app=""
          for c in "/Applications/JARVIS.app" "$HOME/Applications/JARVIS.app"; do
            [ -e "$c" ] && { app="$c"; break; }
          done
          [ -n "$app" ] || { echo "JARVIS.app launch point not created (finding #24)"; exit 1; }
          [ -L "$app" ] && { echo "JARVIS.app is a SYMLINK — must be a real copy (finding #24)"; exit 1; }
          [ -d "$app" ] || { echo "JARVIS.app is not a directory bundle (finding #24)"; exit 1; }
          echo "launch point OK: $app (real ditto copy, not a symlink)"
